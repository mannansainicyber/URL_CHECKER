<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>URL Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #f5f4f0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
      font-family: 'DM Sans', system-ui, sans-serif;
    }

    .wrap {
      width: 100%;
      max-width: 540px;
      margin: 24px;
      background: #fff;
      padding: 56px 48px;
      text-align: center;
      border: 1px solid #e4e2da;
      border-radius: 12px;
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 4px 20px rgba(0,0,0,0.06),
        0 0 0 1px rgba(255,255,255,0.8) inset;
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #0d0d0d;
      margin-bottom: 4px;
    }

    .meta {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 13px 15px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: #111;
      background: #fff;
      border: 1px solid #dddbd3;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input::placeholder { color: #bbb; }

    input:focus {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
    }

    button {
      padding: 13px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: 1px solid #111;
      background: #111;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { background: #222; }
    button:active { transform: scale(0.97); }

    .result {
      margin-top: 22px;
      min-height: 24px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .safe  { color: #1a7f37; }
    .danger { color: #c92a2a; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .safe  .dot { background: #1a7f37; }
    .danger .dot { background: #c92a2a; }

    .footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #f0ede6;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #ccc;
      display: flex;
      justify-content: space-between;
    }

    .loader {
      width: 14px; height: 14px;
      border: 2px solid #e4e2da;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.55s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>URL Scanner</h1>
    <div class="meta">Local &nbsp;·&nbsp; Silent</div>

    <div class="row">
      <input id="urlInput" placeholder="example.com" autofocus>
      <button onclick="analyze()">Scan</button>
    </div>

    <div class="result" id="result"></div>

    <div class="footer">
      <span id="time">0 ms</span>
      <span id="count">Scans: 0</span>
    </div>
  </div>

  <script>
    let scans = 0;

    document.getElementById("urlInput").addEventListener("keydown", e => {
      if (e.key === "Enter") analyze();
    });

    function cleanURL(url) {
      url = url.trim();
      if (!url.startsWith("http://") && !url.startsWith("https://")) {
        url = "http://" + url;
      }
      return url;
    }

    async function analyze() {
      let url = document.getElementById("urlInput").value;
      const result = document.getElementById("result");
      const timeBox = document.getElementById("time");
      const countBox = document.getElementById("count");

      if (!url.trim()) {
        result.className = "result danger";
        result.innerHTML = `<span class="dot"></span>Enter a URL.`;
        return;
      }

      url = cleanURL(url);
      result.className = "result";
      result.innerHTML = `<span class="loader"></span>Scanning`;

      const start = performance.now();

      try {
        const res = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url })
        });

        const data = await res.json();
        const end = performance.now();
        const pct = Math.round(data.confidence * 100);

        scans++;
        countBox.textContent = `Scans: ${scans}`;
        timeBox.textContent = `${Math.round(end - start)} ms`;

        if (data.phishing === 1) {
          result.className = "result danger";
          result.innerHTML = `<span class="dot"></span>Phishing &mdash; ${pct}% sure`;
        } else {
          result.className = "result safe";
          result.innerHTML = `<span class="dot"></span>Safe &mdash; ${pct}% sure`;
        }

      } catch (e) {
        result.className = "result danger";
        result.innerHTML = `<span class="dot"></span>Server error.`;
      }
    }
  </script>
</body>
</html>
